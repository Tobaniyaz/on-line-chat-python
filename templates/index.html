<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.box {
    width: 400px;
    background: #111827;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    outline: none;
    background: #0b1220;
    color: white;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

#chatBox {
    display: none;
    width: 420px;
    height: 600px;
    background: #111827;
    border-radius: 15px;
    flex-direction: column;
}

#chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.msg {
    background: #1f2937;
    margin: 5px;
    padding: 8px;
    border-radius: 10px;
}

.input {
    display: flex;
    padding: 10px;
}

</style>
</head>

<body>

<div class="box" id="loginBox">
    <h2>Enter nickname</h2>
    <input id="name" placeholder="nickname">
    <button onclick="login()">Join</button>
    <p id="error" style="color:red;"></p>
</div>

<div id="chatBox">
    <div id="chat"></div>
    <div class="input">
        <input id="msg" placeholder="message">
        <button onclick="send()">Send</button>
    </div>
</div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

<script>
const socket = io();
let username = "";

function login(){
    username = document.getElementById("name").value;

    socket.emit("login", username);
}

socket.on("login_error", function(msg){
    document.getElementById("error").innerText = msg;
});

socket.on("login_ok", function(name){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("chatBox").style.display = "flex";
});

socket.on("message", function(msg){
    let div = document.createElement("div");
    div.className = "msg";
    div.innerText = msg;
    document.getElementById("chat").appendChild(div);
});

function send(){
    let input = document.getElementById("msg");
    if(input.value.trim() === "") return;

    socket.send(username + ": " + input.value);
    input.value = "";
}
</script>

</body>
</html>
