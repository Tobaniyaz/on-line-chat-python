<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat Files</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.app {
    width: 450px;
    height: 650px;
    background: #111827;
    display: flex;
    flex-direction: column;
    border-radius: 16px;
    overflow: hidden;
}

.header {
    padding: 10px;
    background: #1f2937;
    display: flex;
    justify-content: space-between;
}

#chat {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.msg {
    background: #1f2937;
    padding: 8px;
    margin: 6px 0;
    border-radius: 10px;
}

.name {
    color: #60a5fa;
    font-weight: bold;
}

img {
    max-width: 100%;
    border-radius: 10px;
    margin-top: 5px;
}

.input {
    display: flex;
    padding: 10px;
    background: #1f2937;
}

input[type=text] {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #0b1220;
    color: white;
}

button {
    margin-left: 10px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #3b82f6;
    color: white;
}

.file-btn {
    background: #10b981;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
    <div>Chat + Files</div>
</div>

<div id="chat"></div>

<div class="input">
    <input id="msg" type="text" placeholder="message">

    <input type="file" id="file" style="display:none">

    <button onclick="send()">Send</button>
    <button class="file-btn" onclick="document.getElementById('file').click()">+</button>
</div>

</div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

<script>
const socket = io();

/* TEXT */
function send(){
    let input = document.getElementById("msg");
    if(input.value.trim() === "") return;

    socket.send(input.value);
    input.value = "";
}

/* FILE UPLOAD */
document.getElementById("file").addEventListener("change", async function(){

    let file = this.files[0];
    let form = new FormData();
    form.append("file", file);

    let res = await fetch("/upload", {
        method: "POST",
        body: form
    });

    let data = await res.json();

    let type = file.type.startsWith("image") ? "image" : "file";

    socket.emit("file_msg", {
        url: data.url,
        type: type
    });
});

/* RECEIVE */
socket.on("message", data => {
    let div = document.createElement("div");
    div.className = "msg";

    let content = "";

    if(data.type === "image"){
        content = `<img src="${data.text}">`;
    } else if(data.type === "file"){
        content = `<a href="${data.text}" download style="color:#60a5fa">Download file</a>`;
    } else {
        content = data.text;
    }

    div.innerHTML = `
        <div class="name">${data.name}</div>
        <div>${content}</div>
    `;

    let chat = document.getElementById("chat");
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
});
</script>

</body>
</html.input button {
    margin-left: 10px;
    padding: 10px 14px;
    border: none;
    border-radius: 10px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

.hidden {
    display: none;
}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="login">
    <h3>Enter nickname</h3>
    <input id="name" placeholder="nickname">
    <button onclick="login()">Join</button>
    <p id="err" style="color:red;"></p>
</div>

<!-- APP -->
<div class="app hidden" id="app">
    <div class="header">
        <div>Chat</div>
        <div id="count">0 users</div>
    </div>

    <div id="chat"></div>

    <div class="input">
        <input id="msg" placeholder="message">
        <button onclick="send()">Send</button>
    </div>
</div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

<script>
const socket = io();
let username = "";

/* LOGIN */
function login(){
    username = document.getElementById("name").value;
    socket.emit("login", username);
}

socket.on("login_error", msg => {
    document.getElementById("err").innerText = msg;
});

socket.on("login_ok", () => {
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
});

/* MESSAGE */
socket.on("message", data => {
    let div = document.createElement("div");
    div.className = "msg";

    div.innerHTML = `
        <div class="name">${data.name}</div>
        <div class="text">${data.text}</div>
    `;

    let chat = document.getElementById("chat");
    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;
});

/* USERS COUNT */
socket.on("users_count", count => {
    document.getElementById("count").innerText = count + " users";
});

/* SEND */
function send(){
    let input = document.getElementById("msg");
    if(input.value.trim() === "") return;

    socket.send(input.value);
    input.value = "";
}

/* ENTER */
document.addEventListener("keydown", e => {
    if(e.key === "Enter" && document.activeElement.id === "msg"){
        send();
    }
});
</script>

</body>
</html>
