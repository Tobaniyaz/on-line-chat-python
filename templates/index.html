<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.app {
    width: 450px;
    height: 650px;
    background: #111827;
    display: flex;
    flex-direction: column;
    border-radius: 16px;
    overflow: hidden;
}

#chat {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.msg {
    background: #1f2937;
    margin: 6px 0;
    padding: 8px;
    border-radius: 10px;
}

.name {
    color: #60a5fa;
    font-weight: bold;
}

img {
    max-width: 100%;
    margin-top: 5px;
    border-radius: 10px;
}

.input {
    display: flex;
    padding: 10px;
    background: #1f2937;
}

input[type=text] {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 10px;
    outline: none;
    background: #0b1220;
    color: white;
}

button {
    margin-left: 5px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

.file {
    background: #10b981;
}
</style>
</head>

<body>

<div class="app">

<div id="chat"></div>

<div class="input">
    <input id="msg" type="text" placeholder="message">
    
    <input type="file" id="file" style="display:none">

    <button onclick="send()">Send</button>
    <button class="file" onclick="document.getElementById('file').click()">+</button>
</div>

</div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

<script>
const socket = io();

/* TEXT */
function send(){
    let input = document.getElementById("msg");
    if(input.value.trim() === "") return;

    socket.send(input.value);
    input.value = "";
}

/* FILE */
document.getElementById("file").addEventListener("change", async function(){
    let file = this.files[0];

    let form = new FormData();
    form.append("file", file);

    let res = await fetch("/upload", {
        method: "POST",
        body: form
    });

    let data = await res.json();

    let type = file.type.startsWith("image") ? "image" : "file";

    socket.emit("file", {
        url: data.url,
        type: type,
        filename: file.name
    });
});

/* RECEIVE */
socket.on("message", data => {
    let div = document.createElement("div");
    div.className = "msg";

    let content = "";

    if(data.type === "image"){
        content = `<img src="${data.data}">`;
    }
    else if(data.type === "file"){
        content = `<a href="${data.data}" style="color:#60a5fa" download>${data.filename}</a>`;
    }
    else {
        content = data.data;
    }

    div.innerHTML = `
        <div class="name">${data.name}</div>
        <div>${content}</div>
    `;

    let chat = document.getElementById("chat");
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
});
</script>

</body>
</html>
