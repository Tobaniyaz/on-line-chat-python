<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Messenger</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1220;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

/* LOGIN */
#login {
    width: 320px;
    background: #111827;
    padding: 20px;
    border-radius: 14px;
    text-align: center;
}

#login input {
    width: 90%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: #0b1220;
    color: white;
}

#login button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

/* APP */
.app {
    width: 450px;
    height: 650px;
    background: #111827;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

.header {
    background: #1f2937;
    padding: 10px;
    display: flex;
    justify-content: space-between;
    font-size: 13px;
}

#chat {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.msg {
    margin: 6px 0;
    padding: 8px;
    background: #1f2937;
    border-radius: 10px;
}

.name {
    font-weight: bold;
    color: #60a5fa;
    font-size: 13px;
}

.text {
    margin-top: 3px;
    word-wrap: break-word;
}

.input {
    display: flex;
    padding: 10px;
    background: #1f2937;
}

.input input {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 10px;
    outline: none;
    background: #0b1220;
    color: white;
}

.input button {
    margin-left: 10px;
    padding: 10px 14px;
    border: none;
    border-radius: 10px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

.hidden {
    display: none;
}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="login">
    <h3>Enter nickname</h3>
    <input id="name" placeholder="nickname">
    <button onclick="login()">Join</button>
    <p id="err" style="color:red;"></p>
</div>

<!-- APP -->
<div class="app hidden" id="app">
    <div class="header">
        <div>Chat</div>
        <div id="count">0 users</div>
    </div>

    <div id="chat"></div>

    <div class="input">
        <input id="msg" placeholder="message">
        <button onclick="send()">Send</button>
    </div>
</div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

<script>
const socket = io();
let username = "";

/* LOGIN */
function login(){
    username = document.getElementById("name").value;
    socket.emit("login", username);
}

socket.on("login_error", msg => {
    document.getElementById("err").innerText = msg;
});

socket.on("login_ok", () => {
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
});

/* MESSAGE */
socket.on("message", data => {
    let div = document.createElement("div");
    div.className = "msg";

    div.innerHTML = `
        <div class="name">${data.name}</div>
        <div class="text">${data.text}</div>
    `;

    let chat = document.getElementById("chat");
    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;
});

/* USERS COUNT */
socket.on("users_count", count => {
    document.getElementById("count").innerText = count + " users";
});

/* SEND */
function send(){
    let input = document.getElementById("msg");
    if(input.value.trim() === "") return;

    socket.send(input.value);
    input.value = "";
}

/* ENTER */
document.addEventListener("keydown", e => {
    if(e.key === "Enter" && document.activeElement.id === "msg"){
        send();
    }
});
</script>

</body>
</html>
